<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OrbitWatch — Starlink Collision Intelligence</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>

  <div id="topbar">
    <div id="logo">OrbitWatch</div>
    <div id="nav">
      <button class="nav-btn active" id="btn-globe"     onclick="showView('globe')">Globe</button>
      <button class="nav-btn"        id="btn-dashboard" onclick="showView('dashboard')">Analytics</button>
      <button class="nav-btn"        id="btn-maneuvers" onclick="showView('maneuvers')">Maneuvers</button>
    </div>
    <div id="stats">
      <span id="stat-sats">Satellites: —</span>
      <span id="stat-conj">Conjunctions: —</span>
      <span id="stat-critical">Critical: —</span>
      <span id="stat-time">UTC: —</span>
      <span id="stat-last-updated">Updated: —</span>
    </div>
    <button id="hamburger" onclick="toggleMobileNav()" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </div>

  <div id="mobile-nav-overlay" onclick="closeMobileNav()"></div>
  <div id="mobile-nav-drawer">
    <button class="nav-btn active" id="mob-btn-globe"     onclick="showView('globe');     closeMobileNav()">Globe</button>
    <button class="nav-btn"        id="mob-btn-dashboard" onclick="showView('dashboard'); closeMobileNav()">Analytics</button>
    <button class="nav-btn"        id="mob-btn-maneuvers" onclick="showView('maneuvers'); closeMobileNav()">Maneuvers</button>
  </div>

  <canvas id="globe-canvas"></canvas>

  <div id="search-bar">
    <input id="sat-search" type="text" placeholder="Search satellite..."
      oninput="handleSearch(this.value)" autocomplete="off"/>
    <div id="search-results"></div>
  </div>

  <div id="side-panel">
    <div id="panel-drag-handle"><span></span></div>
    <div id="panel-title">
      Collision Alerts
      <button id="panel-close-btn" onclick="toggleSidePanel()" aria-label="Close panel">✕</button>
    </div>
    <div id="alert-list"></div>
  </div>
  <button id="panel-open-btn" onclick="toggleSidePanel()">⚠ Alerts</button>

  <div id="dashboard-view" class="view hidden">
    <div class="dashboard-grid">
      <div class="chart-card">
        <div class="chart-title">Risk Level Distribution</div>
        <canvas id="chart-risk"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">Top 10 High-Risk Satellites</div>
        <canvas id="chart-topsats"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">Miss Distance Distribution</div>
        <canvas id="chart-distance"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">Relative Velocity Distribution</div>
        <canvas id="chart-velocity"></canvas>
      </div>
    </div>
  </div>

  <div id="maneuvers-view" class="view hidden">
    <div id="maneuver-header-row">
      <div class="view-header" style="margin:0">Maneuver Recommendations</div>
      <button class="export-btn" onclick="exportCSV()">Export CSV</button>
      <button class="export-btn" onclick="exportJSON()">Export JSON</button>
    </div>
    <div id="maneuver-list"></div>
  </div>

  <div id="inspector" class="hidden">
    <div id="inspector-close" onclick="closeInspector()">✕</div>
    <div id="inspector-name"></div>
    <div id="inspector-body"></div>
  </div>

  <div id="bottombar">
    <span id="status-msg">Initialising...</span>
    <button id="btn-rotation" onclick="toggleRotation()" title="Pause / Resume globe rotation">⏸ Rotation</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.1.3/satellite.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

  <!-- CRITICAL ORDER: export → inspector → then everything else -->
  <script src="/static/js/api.js"></script>
  <script src="/static/js/export.js"></script>
  <script src="/static/js/inspector.js"></script>
  <script src="/static/js/globe.js"></script>
  <script src="/static/js/satellites.js"></script>
  <script src="/static/js/conjunctions.js"></script>
  <script src="/static/js/alerts.js"></script>
  <script src="/static/js/dashboard.js"></script>
  <script src="/static/js/maneuver.js"></script>
  <script src="/static/js/search.js"></script>
  <script src="/static/js/router.js"></script>
  <script src="/static/js/main.js"></script>

  <script>
    function toggleMobileNav() {
      document.getElementById('mobile-nav-drawer').classList.toggle('open');
      document.getElementById('mobile-nav-overlay').classList.toggle('open');
    }
    function closeMobileNav() {
      document.getElementById('mobile-nav-drawer').classList.remove('open');
      document.getElementById('mobile-nav-overlay').classList.remove('open');
    }
    function toggleSidePanel() {
      const panel = document.getElementById('side-panel');
      const btn   = document.getElementById('panel-open-btn');
      panel.classList.toggle('mobile-hidden');
      btn.style.display = panel.classList.contains('mobile-hidden') ? 'block' : 'none';
    }
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof showView === 'function') {
        const original = showView;
        window.showView = function(view) {
          original(view);
          ['globe','dashboard','maneuvers'].forEach(v => {
            const btn = document.getElementById('mob-btn-' + v);
            if (btn) btn.classList.toggle('active', v === view);
          });
        };
      }
    });
  </script>

</body>
</html>
